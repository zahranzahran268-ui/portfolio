<!DOCTYPE html>
<html>
    <head>
        <title>زهران  اشرف </title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com"crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Pooppins..." rel="stylesheet">
        <style>
            body{
           background-color: rgb(59, 58, 59);
           color: aliceblue;
           padding: 40px;
           font-family: 'Poppins' , sans-serif;
            direction: ltr;
            }
            h1{
                color: blue;
                text-align: center;
                font-size:40px;
            }
            .header img{
                border-radius: 50%;
                width: 200px;
                height: 200px;
                object-fit: cover;
            }
           .header h2{
                color: rgb(30, 145, 78);
                text-align: center;
            }
            .header {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }
            .contact {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;

            }
            .about {
                
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                
            }
            .skills{
                
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;

            }
            .btn {
                 background-color:#00b4d8;
                 color: rgb(10, 2, 2);
                 padding: 15px 30px;
                 border-radius: 25px;
                 text-decoration: none;
                 margin: 20px;
            }
        </style>
    </head>
    <body>
        <!-- header -->
         <div class="header">
            <img src="imgs/me.png" alt="زهران اشرف" width="200">
            <h1>زهران اشرف</h1>
            <h2>Front-End Developer</h2>
            <a href="#contact" class="btn"> <strong>تواصل معي </strong></a>
         </div>
         <!-- about -->
          <div class="about">
            <h2>احب عملي</h2>
            <p> نظام وامان  </p>
          </div>
          <!-- skills -->
           <div class="skills">
            <h2>مهاراتي</h2>
            <ul>
                <li>html</li>
                <li>css</li>
                <li>javascript</li>
            </ul>
           </div>
           <!-- contact -->
            <div class="contact">
                <h2>تواصل معي </h2>
                <form>
                    <input type="text" placeholder="nem">
                    <input type="email" placeholder="email">
                    <input type="password" placeholder="password">
                    <button>call me</button>
                </form>
            </div>
    </body>
</html>
