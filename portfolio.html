<!DOCTYPE html>
<html>
    <head>
        <title>زهران  اشرف </title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com"crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Pooppins..." rel="stylesheet">
        <style>
            body{
           background-color: rgb(59, 58, 59);
           color: aliceblue;
           padding: 40px;
           font-family: 'Poppins' , sans-serif;
            direction: ltr;
            }
            h1{
                color: blue;
                text-align: center;
                font-size:40px;
            }
            .header img{
                border-radius: 50%;
                width: 200px;
                height: 200px;
                object-fit: cover;
            }
           .header h2{
                color: rgb(30, 145, 78);
                text-align: center;
            }
            .header {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }
            .contact {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;

            }
            .about {
                
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                
            }
            .skills{
                
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;

            }
            .btn {
                 background-color:#00b4d8;
                 color: rgb(10, 2, 2);
                 padding: 15px 30px;
                 border-radius: 25px;
                 text-decoration: none;
                 margin: 20px;
            }
            .projects {
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .projects-card{
                background-color: #251ba7;
                border-radius:10px ;
                width: 300px;
                margin: 20px auto;
                text-align: center;
            }
            .projects-card a{
                color: #00b4d8 ;
                font-size: 16px;
            }
            .contact form {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 15px;
            }
            .contact input {
                padding:10px ;
                border-radius: 8px;
                border:none ;
                width: 300px;

            }
            .contact button{
                padding: 10px 30px ;
                background-color: #00b4d8;
                color: black;
                border: none;
                border-radius: 8px;
                cursor: pointer;

            }
        </style>
    </head>
    <body>
        <!-- header -->
         <div class="header">
            <img src="imgs/me.png" alt="زهران اشرف" width="200">
            <h1>زهران اشرف</h1>
            <h2>Front-End Developer</h2>
            <a href="#contact" class="btn"> <strong>تواصل معي </strong></a>
         </div>
         <!-- about -->
          <div class="about">
            <h2>عني</h2>
            <p> <strong>احب البرمجة وتصميم الويب</strong> </p>
          </div>
          <!-- skills -->
           <div class="skills">
            <h2>مهاراتي</h2>
            <ul>
                <li>html</li>
                <li>css</li>
                <li>javascript</li>
            </ul>
           </div>
           <!-- مشاريعي -->
            <div class="projects">
                <h2>مشاريعي</h2>
                <div class="projects-card">
                    <h3>protfolio شخصي </h3>
                    <p>موقع شخصي بنيته ب html and css</p>
                    <a href="https://zahranzahran268-ui.github.io/portfolio/protfolio.html">شوف المشروع</a>

                </div>
                <div class="projects-card">
                    <h3> 🍕pizza House </h3>
                    <p>مطعم بيتزا بنيته ب html and css </p>
                    <a href="https://zahranzahran268-ui.github.io/pizza-house">شوف المشروع</a>

                </div>
            </div>
           <!-- contact -->
            <div class="contact"> 
                <h2>تواصل معي </h2>
                <form>
                    <input type="text" placeholder="nem">
                    <input type="email" placeholder="email">
                    <input type="password" placeholder="password">
                    <button>call me</button>
                </form>
            </div>
    </body>
</html>
